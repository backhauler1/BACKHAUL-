name: Backend Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'app.js'
      - 'style.css'
      - 'index.html'
      - 'watch.js'
      - 'build.js'
      - 'dist/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'app.js'
      - 'style.css'
      - 'index.html'
      - 'watch.js'
      - 'build.js'
      - 'dist/**'
      - '.github/workflows/build.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npx jest --coverage

      - name: Upload test coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: coverage/