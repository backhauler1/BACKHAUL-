<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with {{ other_user.username }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Socket.IO client -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
<div class="container">
    <a href="{{ url_for('inbox') }}" class="back-link">&larr; Back to Inbox</a>
    <h1>Chat with <a href="{{ url_for('profile', user_id=other_user_id) }}">{{ other_user.username }}</a></h1>

    <div class="chat-box" id="chatBox">
        {% if messages %}
            {% for msg in messages %}
                <div class="message {% if msg.sender_id == session.user_id %}sent{% else %}received{% endif %}">
                    {{ msg.content }}
                    <span class="time">{{ msg.timestamp|datetimeformat }}</span>
                </div>
            {% endfor %}
        {% else %}
            <p class="no-results" id="noMessages" style="padding: 20px 0;">No messages yet. Send one to start the conversation!</p>
        {% endif %}
    </div>

    <!-- The form no longer needs action/method, it will be handled by JS -->
    <form id="chatForm" class="chat-form">
        <input type="text" id="messageInput" placeholder="Type your message..." required autocomplete="off" autofocus>
        <button type="submit">Send</button>
    </form>
</div>

    <script src="{{ url_for('static', filename='map_loader.js') }}"></script>
    <script>
        // Auto-scroll to the bottom of the chat box
        const chatBox = document.getElementById('chatBox');
        chatBox.scrollTop = chatBox.scrollHeight;

        // --- Real-time chat with WebSockets ---
        // Connect to the Socket.IO server.
        // The server URL might need to be adjusted based on your setup.
        const socket = io();

        // Get user IDs from the template (assuming they are available in the session)
        const currentUserId = {{ session.user_id }};
        const otherUserId = {{ other_user_id }};

        // Create a unique room name for this pair of users
        // Sorting ensures the room name is the same regardless of who starts the chat
        const room = [currentUserId, otherUserId].sort().join('_');

        // Join the room when the page loads
        socket.on('connect', () => {
            console.log('Connected to WebSocket server.');
            socket.emit('join', { room: room });
        document.addEventListener('DOMContentLoaded', () => {
            const currentUserId = {{ session.user_id }};
            const otherUserId = {{ other_user_id }};
            initializeChat(currentUserId, otherUserId);
        });

        // Listen for new messages from the server
        socket.on('message', (data) => {
            // Remove the "No messages yet" placeholder if it exists
            const noMessagesEl = document.getElementById('noMessages');
            if (noMessagesEl) {
                noMessagesEl.remove();
            }

            // Create the new message element
            const messageDiv = document.createElement('div');
            const messageClass = data.sender_id == currentUserId ? 'sent' : 'received';
            messageDiv.className = `message ${messageClass}`;

            // Format timestamp (this is a simple version, you might use a library like moment.js)
            const time = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            // Use textContent to prevent XSS vulnerabilities
            const contentNode = document.createTextNode(data.content + ' ');
            const timeSpan = document.createElement('span');
            timeSpan.className = 'time';
            timeSpan.textContent = time;

            messageDiv.appendChild(contentNode);
            messageDiv.appendChild(timeSpan);

            // Append the message to the chat box and scroll down
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        // Handle form submission
        document.getElementById('chatForm').addEventListener('submit', (e) => {
            e.preventDefault(); // Prevent page reload
            const messageInput = document.getElementById('messageInput');
            const messageContent = messageInput.value.trim();

            if (messageContent) {
                // Send the message to the server
                socket.emit('send_message', {
                    room: room,
                    content: messageContent,
                    sender_id: currentUserId,
                    receiver_id: otherUserId
                });

                // Clear the input field
                messageInput.value = '';
                messageInput.focus();
            }
        });
    </script>
</body>
</html>
