<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Too Many Requests</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="text-align: center; margin-top: 50px;">
        <h1 style="color: #d9534f;">Hold Your Horses! 🛑</h1>
        <p>You have been temporarily blocked because you exceeded your rate limit: <strong>{{ error_description }}</strong>.</p>
        <p>Please wait a little while before trying again. This measure is in place to protect the platform from spam and automated attacks.</p>
        <a href="{{ url_for('index') }}" class="btn">Return to Home</a>
    </div>
</body>
</html>
