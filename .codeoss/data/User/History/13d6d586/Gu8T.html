<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leave a Review</title>
    <!-- Basic styling -->
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; cursor: pointer; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Leave a Review for {{ reviewee.username }}</h1>
    <form action="{{ url_for('leave_review', match_id=match_id) }}" method="POST">
        <div class="form-group">
            <label for="rating">Rating (1-5)</label>
            <input type="number" id="rating" name="rating" min="1" max="5" required>
        </div>
        <div class="form-group">
            <label for="comment">Comment (optional)</label>
            <textarea id="comment" name="comment" rows="4"></textarea>
        </div>
        <button type="submit">Submit Review</button>
    </form>
<div class="container">
    <a href="javascript:history.back()" class="back-link">&larr; Go Back</a>
    <section>
        <h2>Leave a Review for {{ reviewee.username }}</h2>
        <form action="{{ url_for('leave_review', match_id=match_id) }}" method="POST">
            <div>
                <label for="rating">Rating (1-5)</label>
                <input type="number" id="rating" name="rating" min="1" max="5" required>
            </div>
            <div>
                <label for="comment">Comment (optional)</label>
                <textarea id="comment" name="comment" rows="4"></textarea>
            </div>
            <button type="submit">Submit Review</button>
        </form>
    </section>
</div>
</body>
</html>
